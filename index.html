<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Business Wallet 2026 - Master Pro</title>
    <style>
        :root { --primary: #4834d4; --income: #00b894; --expense: #eb4d4b; --dark: #2d3436; --white: #ffffff; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; }
        
        #statusIndicator { position: fixed; top: 10px; right: 10px; padding: 5px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: bold; z-index: 10001; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .online { background: #dff9fb; color: #00b894; border: 1px solid #00b894; }
        .offline { background: #fab1a0; color: #d63031; border: 1px solid #d63031; }

        #loginOverlay { position: fixed; inset: 0; background: var(--primary); display: flex; justify-content: center; align-items: center; z-index: 10000; }
        .login-card { background: white; padding: 35px; border-radius: 30px; width: 85%; max-width: 350px; text-align: center; }
        .login-card input { width: 100%; padding: 14px; margin: 10px 0; border: 1.5px solid #eee; border-radius: 15px; box-sizing: border-box; outline: none; }
        
        .app-container { max-width: 500px; margin: auto; padding: 15px; display: none; }
        .header-card { background: linear-gradient(135deg, #341f97, #4834d4); color: white; padding: 30px 20px; border-radius: 30px; text-align: center; margin-bottom: 10px; position: relative; }
        .bal-val { font-size: 2.8rem; font-weight: 800; margin: 10px 0; }
        
        .daily-summary { background: var(--dark); color: white; display: grid; grid-template-columns: 1fr 1fr; padding: 15px; border-radius: 20px; text-align: center; margin-bottom: 20px; }
        .card { background: var(--white); border-radius: 25px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        
        .cat-scroll { overflow-x: auto; white-space: nowrap; margin-bottom: 15px; padding-bottom: 5px; display: flex; gap: 10px; }
        .cat-item { flex: 0 0 auto; padding: 15px 20px; border-radius: 15px; border: 1px solid #eee; text-align: center; cursor: pointer; min-width: 80px; background: white; }
        .cat-item.active.plus { background: var(--income); color: white; border-color: var(--income); }
        .cat-item.active.minus { background: var(--expense); color: white; border-color: var(--expense); }

        .main-input { width: 100%; padding: 16px; border: 1.5px solid #eee; border-radius: 15px; margin-bottom: 12px; box-sizing: border-box; outline: none; }
        .btn-submit { width: 100%; padding: 18px; border: none; border-radius: 20px; background: var(--primary); color: white; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        
        .log-item { background: white; padding: 15px; border-radius: 20px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 6px solid #ccc; }
        .del-btn { color: var(--expense); border: none; background: none; cursor: pointer; font-size: 1.1rem; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; width: 95%; max-width: 450px; padding: 25px; border-radius: 30px; max-height: 90vh; overflow-y: auto; }
        .setting-box { background: #f8f9fa; padding: 15px; border-radius: 20px; margin-bottom: 15px; border: 1px solid #eee; text-align: left; }
        .type-opt { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid #ddd; text-align: center; cursor: pointer; font-size: 0.8rem; }
        .type-opt.selected.plus { background: var(--income); color: white; }
        .type-opt.selected.minus { background: var(--expense); color: white; }
    </style>
</head>
<body>

<div id="statusIndicator" class="offline">Connecting...</div>

<div id="loginOverlay">
    <div class="login-card">
        <h2 style="color:var(--primary); margin-top:0;">🔐 စာရင်းဝင်မည်</h2>
        <input type="text" id="userInput" placeholder="Username">
        <input type="password" id="passInput" placeholder="Password">
        <button class="btn-submit" id="loginBtn">Login ဝင်မည်</button>
        <p id="loginError" style="color:red; font-size:0.8rem; display:none; margin-top:10px;">⚠️ မှားယွင်းနေပါသည်။</p>
    </div>
</div>

<div class="app-container" id="app">
    <div class="header-card">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <div id="roleDisplay" style="font-size:0.8rem; opacity:0.8;">Role: Loading...</div>
            <div style="display:flex; gap:10px;">
                <button id="settingBtn" style="background:none; border:none; color:white; font-size:1.2rem; cursor:pointer;">⚙️</button>
            </div>
        </div>
        <div style="margin-top:10px;">စုစုပေါင်းလက်ကျန်ငွေ</div>
        <div class="bal-val"><span id="totalDisplay">0</span></div>
        <div style="font-size:0.9rem; opacity:0.9;">MMK (ကျပ်)</div>
    </div>

    <div class="daily-summary">
        <div>ဝင်ငွေ: <span id="dayInDisplay" style="color:var(--income)">0</span></div>
        <div>အသုံး: <span id="dayOutDisplay" style="color:var(--expense)">0</span></div>
    </div>

    <div class="card">
        <div class="cat-scroll" id="catRow"></div>
        <input type="text" id="itemName" class="main-input" placeholder="အကြောင်းအရာ">
        <input type="number" id="itemAmt" class="main-input" placeholder="ပမာဏ (ကျပ်)">
        <button class="btn-submit" id="saveBtn">📥 စာရင်းသွင်းမည်</button>
    </div>

    <h3 style="margin:20px 5px;">🕒 Cloud မှတ်တမ်းများ</h3>
    <div id="logHistory"></div>
    <button class="btn-submit" style="background:var(--dark); margin-top:20px;" onclick="location.reload()">🚪 Logout ထွက်မည်</button>
</div>

<div id="settingsModal" class="modal">
    <div class="modal-content">
        <h3 style="margin-top:0;">⚙️ Settings</h3>
        
        <div class="setting-box">
            <h4>📁 အမျိုးအစားများ စီမံရန်</h4>
            <div id="catEditList" style="margin-bottom:15px; border-bottom: 1px solid #ddd; padding-bottom: 10px;"></div>
            <div style="display:flex; gap:5px; margin-bottom:10px;">
                <div id="typePlus" class="type-opt selected plus" onclick="window.setNewCatType('plus')">ဝင်ငွေ (+)</div>
                <div id="typeMinus" class="type-opt minus" onclick="window.setNewCatType('minus')">အသုံး (-)</div>
            </div>
            <div style="display:flex; gap:5px;">
                <input type="text" id="newCatIcon" class="main-input" placeholder="🎁" style="width:25%; margin-bottom:0;">
                <input type="text" id="newCatName" class="main-input" placeholder="အမည်" style="width:75%; margin-bottom:0;">
            </div>
            <button class="btn-submit" style="background:var(--income); padding:10px; margin-top:10px;" id="addCatBtn">အမျိုးအစားသစ်ထည့်မည်</button>
        </div>

        <div class="setting-box">
            <h4>🔐 User Accounts</h4>
            <input type="text" id="newAdminUser" class="main-input" placeholder="Admin User">
            <input type="text" id="newAdminPass" class="main-input" placeholder="Admin Pass">
            <hr>
            <input type="text" id="newStaffUser" class="main-input" placeholder="Staff User">
            <input type="text" id="newStaffPass" class="main-input" placeholder="Staff Pass">
            <button class="btn-submit" style="padding:10px;" id="saveAccBtn">အကောင့်များသိမ်းမည်</button>
        </div>

        <div class="setting-box">
            <h4>💰 မူလလက်ကျန်ငွေ</h4>
            <input type="number" id="openingBalInput" class="main-input">
            <button class="btn-submit" style="background:#636e72; padding:10px;" id="saveOpenBtn">သိမ်းမည်</button>
        </div>

        <button class="btn-submit" style="background:#ccc; color:#333;" id="closeSettings">ပိတ်မည်</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAo0NxlLIUtWzIJJx8Ein5Ftidacw0W9Lw",
        authDomain: "myrecordsystem-af249.firebaseapp.com",
        projectId: "myrecordsystem-af249",
        storageBucket: "myrecordsystem-af249.firebasestorage.app",
        messagingSenderId: "64211980634",
        appId: "1:64211980634:web:33c2209372ff298045e363",
        measurementId: "G-DT9N6G4MQS"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // --- State ---
    let records = [];
    let categories = [
        { id: 1, icon: "💰", name: "ဝင်ငွေ", type: "plus" },
        { id: 2, icon: "🛒", name: "အသုံး", type: "minus" }
    ];
    let isAdmin = false;
    let selectedCatId = 1;
    let openingBal = 0;
    let loginConfigs = { admin: {u:"admin", p:"1234"}, staff: {u:"staff", p:"5678"} };
    let newCatType = 'plus';

    // --- Sync Firebase ---
    onSnapshot(query(collection(db, "records"), orderBy("timestamp", "desc")), (snapshot) => {
        records = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        renderUI();
    });

    async function loadCloudSettings() {
        const docRef = doc(db, "settings", "main_config");
        const docSnap = await getDoc(docRef);
        if (docSnap.exists()) {
            const data = docSnap.data();
            openingBal = data.openingBal || 0;
            loginConfigs = data.loginConfigs || loginConfigs;
            if(data.categories) categories = data.categories;
        }
        renderUI();
    }
    loadCloudSettings();

    // --- Window Functions ---
    window.setCat = (id) => { selectedCatId = id; renderUI(); };
    window.setNewCatType = (t) => { 
        newCatType = t; 
        document.getElementById('typePlus').classList.toggle('selected', t === 'plus');
        document.getElementById('typeMinus').classList.toggle('selected', t === 'minus');
    };
    window.deleteRec = async (id) => { if(confirm("ဤစာရင်းကို ဖျက်မှာလား?")) await deleteDoc(doc(db, "records", id)); };
    window.removeCat = async (id) => {
        if(confirm("ဤအမျိုးအစားကို ဖျက်မှာလား?")) {
            categories = categories.filter(c => c.id !== id);
            await saveSettingsToCloud();
            renderUI();
            renderEditCats();
        }
    };

    async function saveSettingsToCloud() {
        await setDoc(doc(db, "settings", "main_config"), { loginConfigs, openingBal, categories }, { merge: true });
    }

    function renderUI() {
        const catRow = document.getElementById('catRow');
        catRow.innerHTML = categories.map(c => `
            <div class="cat-item ${c.id === selectedCatId ? 'active ' + c.type : ''}" onclick="window.setCat(${c.id})">
                <div>${c.icon}</div><div style="font-size:0.75rem; margin-top:5px;">${c.name}</div>
            </div>`).join('');

        let net = 0, dIn = 0, dOut = 0;
        const history = document.getElementById('logHistory');
        history.innerHTML = '';
        
        records.forEach(r => {
            const isP = r.type === 'plus';
            net += isP ? r.amt : -r.amt;
            dIn += isP ? r.amt : 0; dOut += isP ? 0 : r.amt;
            history.innerHTML += `<div class="log-item" style="border-left-color:${isP?'var(--income)':'var(--expense)'}">
                <div><b>${r.name}</b><br><small>${r.icon} ${r.catName}</small></div>
                <div style="display:flex; align-items:center; gap:10px;">
                    <b style="color:${isP?'var(--income)':'var(--expense)'}">${isP?'+':'-'}${r.amt.toLocaleString()}</b>
                    ${isAdmin ? `<button class="del-btn" onclick="window.deleteRec('${r.id}')">✖</button>` : ''}
                </div></div>`;
        });
        document.getElementById('totalDisplay').innerText = (openingBal + net).toLocaleString();
        document.getElementById('dayInDisplay').innerText = dIn.toLocaleString();
        document.getElementById('dayOutDisplay').innerText = dOut.toLocaleString();
    }

    function renderEditCats() {
        document.getElementById('catEditList').innerHTML = categories.map(c => `
            <div style="display:flex; justify-content:space-between; padding:8px; border-bottom:1px solid #eee;">
                <span>${c.icon} ${c.name} (${c.type === 'plus' ? 'ဝင်ငွေ' : 'အသုံး'})</span>
                <span style="color:red; cursor:pointer;" onclick="window.removeCat(${c.id})">✖</span>
            </div>`).join('');
    }

    // --- Buttons ---
    document.getElementById('loginBtn').onclick = () => {
        const u = document.getElementById('userInput').value;
        const p = document.getElementById('passInput').value;
        if(u === loginConfigs.admin.u && p === loginConfigs.admin.p) { isAdmin = true; startApp("Admin"); }
        else if(u === loginConfigs.staff.u && p === loginConfigs.staff.p) { isAdmin = false; startApp("Staff"); }
        else { document.getElementById('loginError').style.display = 'block'; }
    };

    function startApp(role) {
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        document.getElementById('roleDisplay').innerText = "Role: " + role;
        if(!isAdmin) document.getElementById('settingBtn').style.display = 'none';
        renderUI();
    }

    document.getElementById('saveBtn').onclick = async () => {
        const amt = parseFloat(document.getElementById('itemAmt').value);
        if(!amt) return alert("ပမာဏ ထည့်ပါ");
        const c = categories.find(x => x.id === selectedCatId);
        if(!c) return alert("အမျိုးအစား ရွေးပါ");
        await addDoc(collection(db, "records"), {
            name: document.getElementById('itemName').value || "မှတ်ချက်မရှိ",
            amt: amt, catName: c.name, icon: c.icon, type: c.type, timestamp: Date.now()
        });
        document.getElementById('itemAmt').value = ''; document.getElementById('itemName').value = '';
    };

    document.getElementById('addCatBtn').onclick = async () => {
        const name = document.getElementById('newCatName').value;
        if(!name) return alert("အမည်ထည့်ပါ");
        categories.push({ id: Date.now(), icon: document.getElementById('newCatIcon').value || "🎁", name, type: newCatType });
        await saveSettingsToCloud();
        document.getElementById('newCatName').value = '';
        renderEditCats(); renderUI();
    };

    document.getElementById('settingBtn').onclick = () => {
        document.getElementById('openingBalInput').value = openingBal;
        document.getElementById('newAdminUser').value = loginConfigs.admin.u;
        document.getElementById('newAdminPass').value = loginConfigs.admin.p;
        document.getElementById('newStaffUser').value = loginConfigs.staff.u;
        document.getElementById('newStaffPass').value = loginConfigs.staff.p;
        renderEditCats();
        document.getElementById('settingsModal').style.display = 'flex';
    };

    document.getElementById('saveAccBtn').onclick = async () => {
        loginConfigs.admin.u = document.getElementById('newAdminUser').value;
        loginConfigs.admin.p = document.getElementById('newAdminPass').value;
        loginConfigs.staff.u = document.getElementById('newStaffUser').value;
        loginConfigs.staff.p = document.getElementById('newStaffPass').value;
        await saveSettingsToCloud(); alert("Saved!");
    };

    document.getElementById('saveOpenBtn').onclick = async () => {
        openingBal = parseFloat(document.getElementById('openingBalInput').value) || 0;
        await saveSettingsToCloud(); renderUI(); alert("Saved!");
    };

    document.getElementById('closeSettings').onclick = () => document.getElementById('settingsModal').style.display = 'none';

    window.addEventListener('online', () => { document.getElementById('statusIndicator').className="online"; document.getElementById('statusIndicator').innerText="Online 🟢"; });
    window.addEventListener('offline', () => { document.getElementById('statusIndicator').className="offline"; document.getElementById('statusIndicator').innerText="Offline 🔴"; });
    if(navigator.onLine) { document.getElementById('statusIndicator').className="online"; document.getElementById('statusIndicator').innerText="Online 🟢"; }
</script>
</body>
</html>
